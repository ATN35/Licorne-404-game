<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>404 ERROR – Évite le chiffre maléfique</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <div class="glitch-title">404 ERREUR – ÉVITE LE CHIFFRE MALÉFIQUE</div>
    </div>
    <div class="game-canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
        <div class="effect-message" id="effectMessage"></div>
        <div class="bottom-info">
            <div class="scores-panel">✨ SCORE: <span id="scoreValue">0</span> &nbsp;|&nbsp; 🏆 RECORD: <span id="bestValue">0</span></div>
            <button class="restart-btn" id="restartBtn">🔄 Rejouer</button>
        </div>
    </div>
</div>
<script src="game.js"></script>
</body>
</html>
